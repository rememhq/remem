name: CI

# Thin orchestrator — triggers all component workflows and gates the PR.
# Individual workflows: rust.yml, sdk-python.yml, sdk-typescript.yml, smoke.yml, security.yml
# This workflow runs on ALL pushes/PRs to catch changes that don't match
# any path filter in the component workflows.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # Quick sanity check — workspace compiles
  # ──────────────────────────────────────────────
  sanity:
    name: Workspace Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check (fast compile-only)
        run: cargo check --workspace

  # ──────────────────────────────────────────────
  # Security audit
  # ──────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
