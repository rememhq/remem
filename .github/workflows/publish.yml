name: Publish SDKs & Crates

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        type: boolean
        default: true

jobs:
  # ──────────────────────────────────────────────
  # Publish Python SDK to PyPI
  # ──────────────────────────────────────────────
  python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build
        working-directory: sdk/python
        run: python -m build

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  # ──────────────────────────────────────────────
  # Publish TypeScript SDK to npm
  # ──────────────────────────────────────────────
  typescript:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install & Build
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: sdk/typescript
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────
  # Publish Rust crates to crates.io
  # Order: remem-core → remem-mcp → remem-api → remem-cli
  # (respects dependency graph)
  # ──────────────────────────────────────────────
  rust:
    name: Publish Rust Crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish remem-core
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p remem-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index (core)
        run: sleep 30

      - name: Publish remem-mcp
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p remem-mcp --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index (mcp)
        run: sleep 30

      - name: Publish remem-api
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p remem-api --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index (api)
        run: sleep 30

      - name: Publish remem-cli
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p remem-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
