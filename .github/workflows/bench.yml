name: Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - "remem-core/**"
      - "libremem/**"
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # Rust benchmarks
  # ──────────────────────────────────────────────
  benchmark:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher 2>&1 | tee bench-output.txt
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-output.txt
          retention-days: 30

  # ──────────────────────────────────────────────
  # Binary size tracking
  # ──────────────────────────────────────────────
  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p remem-cli -p remem-api -p remem-mcp

      - name: Report sizes
        run: |
          echo "## Binary Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          for bin in remem remem-api remem-mcp; do
            if [ -f "target/release/$bin" ]; then
              size=$(du -h "target/release/$bin" | cut -f1)
              echo "| \`$bin\` | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done
