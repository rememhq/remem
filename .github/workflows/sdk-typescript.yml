name: TypeScript SDK

on:
  push:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/sdk-typescript.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/sdk-typescript.yml"

concurrency:
  group: sdk-typescript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Type check + Build
  # ──────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install
        working-directory: sdk/typescript
        run: npm install

      - name: Type check
        working-directory: sdk/typescript
        run: npx tsc --noEmit

      - name: Build
        working-directory: sdk/typescript
        run: npm run build

  # ──────────────────────────────────────────────
  # Test
  # ──────────────────────────────────────────────
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install & Build
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build

      - name: Test
        working-directory: sdk/typescript
        run: npm test

  # ──────────────────────────────────────────────
  # Gate
  # ──────────────────────────────────────────────
  typescript-pass:
    name: TypeScript SDK Pass
    if: always()
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate
        run: |
          if [[ "${{ needs.build.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ TypeScript SDK checks failed"
            exit 1
          fi
          echo "✅ TypeScript SDK checks passed"
